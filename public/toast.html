<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
    }
    body.visible { opacity: 1; }
    body.fading { opacity: 0; transition: opacity 0.4s ease; }

    .toast {
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 12px;
      padding: 20px 24px;
      margin: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: border-color 0.2s;
    }
    .toast:hover { border-color: #5a5a8c; }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: #e8a849;
      margin-bottom: 6px;
    }
    .project {
      font-size: 13px;
      color: #8888aa;
      margin-bottom: 6px;
    }
    .message {
      font-size: 14px;
      color: #d0d0e0;
      margin-top: 4px;
      word-wrap: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .project:empty, .message:empty { display: none; }
  </style>
</head>
<body>
  <div class="toast">
    <div class="title" id="title"></div>
    <div class="project" id="project"></div>
    <div class="message" id="message"></div>
  </div>

  <script>
    // Read data from URL query params (set by Rust backend)
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || 'Claude Code';
    const project = params.get('project') || '';
    const message = params.get('message') || '';

    document.getElementById('title').textContent = title;
    document.getElementById('project').textContent = project;
    document.getElementById('message').textContent = message;

    // Fade in
    requestAnimationFrame(() => {
      document.body.classList.add('visible');
    });

    function closeToast() {
      try {
        if (window.__TAURI__) {
          var win = window.__TAURI__.webviewWindow
            ? window.__TAURI__.webviewWindow.getCurrentWebviewWindow()
            : window.__TAURI__.window
            ? window.__TAURI__.window.getCurrentWindow()
            : null;
          if (win) win.close();
        }
      } catch (e) { /* Rust-side timer will clean up */ }
    }

    // Auto-close after 5 seconds
    setTimeout(() => {
      document.body.classList.remove('visible');
      document.body.classList.add('fading');
      setTimeout(closeToast, 400);
    }, 5000);

    // Click to activate terminal and close
    document.body.addEventListener('click', () => {
      try {
        if (window.__TAURI__) window.__TAURI__.core.invoke('activate_terminal');
      } catch (e) {}
      closeToast();
    });
  </script>
</body>
</html>
